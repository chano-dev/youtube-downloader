<!DOCTYPE html>
<html lang="pt-AO" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <title>YT Downloader — Baixar vídeos e áudio do YouTube</title>
    <meta name="description" content="Aplicação local para baixar vídeos e áudio do YouTube em várias qualidades. Gratuito, sem anúncios, sem limites. Powered by yt-dlp.">
    <meta name="keywords" content="youtube downloader, baixar vídeo youtube, yt-dlp, download youtube mp3, download youtube mp4, conversor youtube">
    <meta name="author" content="Charles Nuno">
    <meta name="robots" content="index, follow">

    <!-- Open Graph (LinkedIn, Facebook) -->
    <meta property="og:title" content="YT Downloader — Baixar vídeos e áudio do YouTube">
    <meta property="og:description" content="Aplicação local e gratuita para baixar vídeos e áudio do YouTube. Sem anúncios, sem limites.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://github.com/chano-dev/youtube-downloader">
    <meta property="og:image" content="https://raw.githubusercontent.com/chano-dev/youtube-downloader/main/screenshot.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="YT Downloader — Baixar vídeos e áudio do YouTube">
    <meta name="twitter:description" content="Aplicação local e gratuita para baixar vídeos e áudio do YouTube.">

    <!-- Favicon (SVG inline) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23FF0000'/><polygon points='13,9 13,23 24,16' fill='white'/></svg>">

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-top">
                <div class="logo">
                    <!-- SVG Play icon -->
                    <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="40" height="40" rx="10" fill="#FF0000"/>
                        <path d="M16 11L28 20L16 29V11Z" fill="white"/>
                    </svg>
                    <h1>YT Downloader</h1>
                </div>
                <!-- Theme Toggle -->
                <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema">
                    <!-- Sun icon (shown in dark mode) -->
                    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <!-- Moon icon (shown in light mode) -->
                    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
            </div>
            <p class="subtitle">Cola o link e baixa o vídeo</p>
        </header>

        <!-- URL Input -->
        <div class="input-section">
            <div class="input-group">
                <div class="input-wrapper">
                    <!-- Search/Link SVG icon -->
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                    </svg>
                    <input
                        type="text"
                        id="videoUrl"
                        placeholder="Cola aqui o link do YouTube..."
                        autocomplete="off"
                        spellcheck="false"
                    >
                </div>
                <button id="btnInfo" onclick="getVideoInfo()">
                    <!-- Search SVG -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <span>Buscar</span>
                </button>
            </div>
        </div>

        <!-- Empty state (before search) -->
        <div id="emptyState" class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            <p>Cole um link do YouTube acima para começar</p>
        </div>

        <!-- Toast messages (errors & success) -->
        <div id="toast" class="toast hidden">
            <div class="toast-icon">
                <!-- Error icon -->
                <svg class="toast-icon-error" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="15" y1="9" x2="9" y2="15"/>
                    <line x1="9" y1="9" x2="15" y2="15"/>
                </svg>
                <!-- Success icon -->
                <svg class="toast-icon-success" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                    <polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
                <!-- Warning icon -->
                <svg class="toast-icon-warning" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                    <line x1="12" y1="9" x2="12" y2="13"/>
                    <line x1="12" y1="17" x2="12.01" y2="17"/>
                </svg>
            </div>
            <div class="toast-content">
                <p class="toast-title" id="toastTitle"></p>
                <p class="toast-message" id="toastMessage"></p>
            </div>
            <button class="toast-close" onclick="hideToast()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>

        <!-- Video Info Card -->
        <div id="videoInfo" class="video-card hidden">
            <div class="video-card-inner">
                <div class="thumbnail-wrapper">
                    <img id="thumbnail" src="" alt="Thumbnail do vídeo">
                    <div class="thumbnail-duration" id="videoDuration"></div>
                </div>
                <div class="video-details">
                    <h2 id="videoTitle"></h2>
                    <div class="video-meta">
                        <!-- Channel icon -->
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <span id="videoUploader"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Quality Selection -->
        <div id="qualitySection" class="quality-section hidden">
            <p class="section-label">Escolhe a qualidade</p>
            <div class="quality-options">
                <button class="quality-btn active" data-quality="best-video">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/>
                        <line x1="7" y1="2" x2="7" y2="22"/>
                        <line x1="17" y1="2" x2="17" y2="22"/>
                        <line x1="2" y1="12" x2="22" y2="12"/>
                        <line x1="2" y1="7" x2="7" y2="7"/>
                        <line x1="2" y1="17" x2="7" y2="17"/>
                        <line x1="17" y1="7" x2="22" y2="7"/>
                        <line x1="17" y1="17" x2="22" y2="17"/>
                    </svg>
                    <span>Melhor Qualidade</span>
                </button>
                <button class="quality-btn" data-quality="720p">
                    <span>720p</span>
                </button>
                <button class="quality-btn" data-quality="480p">
                    <span>480p</span>
                </button>
                <button class="quality-btn" data-quality="360p">
                    <span>360p</span>
                </button>
                <button class="quality-btn" data-quality="audio-only">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 18V5l12-2v13"/>
                        <circle cx="6" cy="18" r="3"/>
                        <circle cx="18" cy="16" r="3"/>
                    </svg>
                    <span>Apenas Áudio (MP3)</span>
                </button>
            </div>

            <button id="btnDownload" onclick="startDownload()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                <span>Baixar</span>
            </button>
        </div>

        <!-- Progress -->
        <div id="progressSection" class="progress-section hidden">
            <div class="progress-header">
                <span id="progressPercent">0%</span>
                <span id="progressDetail">A preparar...</span>
            </div>
            <div class="progress-track">
                <div id="progressBar" class="progress-fill"></div>
            </div>
        </div>

        <!-- Credits Modal -->
        <div id="creditsModal" class="modal-overlay hidden">
            <div class="modal">
                <div class="modal-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                    </svg>
                </div>
                <h3>Desenvolvido por</h3>
                <p class="modal-author">Charles Nuno</p>
                <p class="modal-desc">Se este projecto te foi útil, conecta-te comigo:</p>
                <div class="modal-links">
                    <a href="https://www.linkedin.com/in/charles-nuno" target="_blank" rel="noopener noreferrer" class="modal-link linkedin">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                        </svg>
                        <span>LinkedIn</span>
                    </a>
                    <a href="https://youtube.com/@charlesnuno" target="_blank" rel="noopener noreferrer" class="modal-link youtube">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                        </svg>
                        <span>YouTube</span>
                    </a>
                    <a href="https://github.com/chano-dev" target="_blank" rel="noopener noreferrer" class="modal-link github">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
                        </svg>
                        <span>GitHub</span>
                    </a>
                </div>
                <button class="modal-continue" id="modalContinue">
                    Continuar download
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"/>
                        <polyline points="12 5 19 12 12 19"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>Feito por <a href="https://github.com/chano-dev" target="_blank" rel="noopener noreferrer">Charles Nuno</a></p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
